<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure 50 Contacts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }
        #contacts-section {
            display: none; /* Initially hidden */
            text-align: left;
            max-height: 80vh;
            overflow-y: auto; /* Scrollbar if list is long */
            padding-right: 10px;
        }
        input[type="password"] {
            padding: 12px;
            width: 85%;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #2ecc71;
        }
        .contact-card {
            background: #f9f9f9;
            padding: 12px;
            margin: 8px 0;
            border-left: 5px solid #2980b9;
            border-radius: 4px;
        }
        .contact-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .contact-number {
            font-size: 14px;
            color: #555;
            margin-top: 4px;
        }
        #error-msg {
            color: #e74c3c;
            display: none;
            margin-top: 10px;
            font-weight: bold;
        }
        .logout-btn {
            background: #e74c3c;
            width: 100%;
            margin-top: 20px;
            position: sticky;
            bottom: 0;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h2>Enter Password</h2>
        <p style="color: #666; font-size: 14px;">Enter password to view your 50 secure contacts.</p>
        <input type="password" id="passwordInput" placeholder="Password">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <p id="error-msg">Incorrect Password! Try again.</p>
    </div>

    <div class="container" id="contacts-section">
        <h2 style="text-align: center; color: #2980b9; margin-top: 0;">My Contact List</h2>
        
        <div id="contacts-container"></div>

            const container = document.getElementById("contacts-container");

                // Jodi kono slot khali thake ba default thake seta bad dewa ba show korar logic
                container.innerHTML += `
                    <div class="contact-card">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-number">📞 ${contact.phone}</div>
                    </div>
                `;
            });
        }

        function checkPassword() {
            let enteredPassword = document.getElementById("passwordInput").value;
            
            if (enteredPassword === mySecretPassword) {
                document.getElementById("login-section").style.display = "none";
                document.getElementById("contacts-section").style.display = "block";
                loadContacts(); // Password millei shudhu number load hobe
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        function lockContacts() {
            document.getElementById("passwordInput").value = "";
            document.getElementById("error-msg").style.display = "none";
            document.getElementById("contacts-section").style.display = "none";
            document.getElementById("login-section").style.display = "block";
            document.getElementById("contacts-container").innerHTML = ""; // Security er jonno data clear kore dewa
